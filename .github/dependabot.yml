version: 2
updates:
  # Python dependencies (pyproject.toml)
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Bucharest"
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "deps(python)"
    groups:
      python-deps:
        patterns: ["*"]
        update-types:
          - minor
          - patch

  # Web dependencies (web/package.json)
  - package-ecosystem: npm
    directory: "/web"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Bucharest"
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "deps(web)"
    groups:
      web-deps:
        patterns: ["*"]
        update-types:
          - minor
          - patch

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
    commit-message:
      prefix: "deps(ci)"
    groups:
      ci-deps:
        patterns: ["*"]
        update-types:
          - minor
          - patch
          - major

  # Docker base images
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels:
      - dependencies
    commit-message:
      prefix: "deps(docker)"
    groups:
      docker-deps:
        patterns: ["*"]
        update-types:
          - minor
          - patch
