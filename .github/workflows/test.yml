name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (Python 3.14, Postgres + pgvector)
    runs-on: ubuntu-latest

    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: memory_vault
          POSTGRES_USER: memory_vault
          POSTGRES_PASSWORD: memory_vault
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U memory_vault -d memory_vault"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: memory_vault
      DB_USER: memory_vault
      DB_PASSWORD: memory_vault

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Cache HuggingFace + spaCy model downloads
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch
            ~/.cache/pip
          key: ml-models-${{ runner.os }}-py314-v1
          restore-keys: |
            ml-models-${{ runner.os }}-py314-

      - name: Install package + dev deps
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Run pytest
        run: pytest -v --tb=short

  web-build:
    name: Web build (vite production bundle)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 26
        uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
